<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毕业市集 — 好物转让</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 顶部导航 -->
  <nav class="navbar">
    <div class="logo">
      🎓 毕业市集
      <span class="nav-subtitle">好物不散，传递给有缘人</span>
    </div>
  </nav>

  <!-- Hero Banner -->
  <div class="hero">
    <h1>🛍️ 毕业好物转让</h1>
    <p>四年陪伴，物尽其用<br>扫码浏览，线下交易</p>
    <div class="contact-badge">📍 现场摆摊 · 线下交易</div>
  </div>

  <!-- 分类筛选 -->
  <div class="filter-bar" id="filterBar"></div>

  <!-- 商品列表 -->
  <div class="section-title">
    🏷️ 全部商品 &nbsp;
    <span id="productCount" style="font-weight:400;color:#636e72;font-size:13px"></span>
  </div>
  <div class="product-grid" id="productGrid"></div>

  <!-- 底部提示 -->
  <div class="footer">
    💡 看中商品？来摊位找 <strong>摊主</strong> 线下交易吧～
  </div>

  <div class="toast" id="toast"></div>
  <script src="js/main.js"></script>
</body>
</html>
