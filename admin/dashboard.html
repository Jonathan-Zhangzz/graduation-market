<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理 — 毕业市集</title>
  <!-- ✅ 相对路径，从 admin/ 目录出发 -->
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin-body">

  <nav class="admin-navbar">
    <div class="logo">⚙️ 后台管理</div>
    <button class="logout-btn" id="logoutBtn">退出登录</button>
  </nav>

  <div class="admin-container">

    <!-- 统计卡片 -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="num" id="statTotal">0</div>
        <div class="label">全部商品</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statAvail" style="color:#00b894">0</div>
        <div class="label">在售中</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statSold" style="color:#b2bec3">0</div>
        <div class="label">已售出</div>
      </div>
    </div>

    <!-- 联系方式设置 -->
    <div class="form-card">
      <h2>📱 联系方式设置</h2>
      <form id="contactForm">
        <div class="form-row">
          <div class="form-group">
            <label>微信号</label>
            <input type="text" id="cWechat" placeholder="你的微信号">
          </div>
          <div class="form-group">
            <label>手机号（可选）</label>
            <input type="tel" id="cPhone" placeholder="选填">
          </div>
        </div>
        <div class="form-group">
          <label>摊位备注</label>
          <input type="text" id="cNote" placeholder="如：在XX楼门口，欢迎来找我～">
        </div>
        <button type="submit" class="btn-primary">💾 保存联系方式</button>
      </form>
    </div>

    <!-- 添加商品 -->
    <div class="form-card">
      <h2>➕ 添加商品</h2>
      <form id="addForm">
        <div class="form-row">
          <div class="form-group">
            <label>商品名称 *</label>
            <input type="text" id="pName" placeholder="如：九成新台灯" required>
          </div>
          <div class="form-group">
            <label>价格（元）*</label>
            <input type="number" id="pPrice" placeholder="如：25" min="0" step="0.5" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>分类</label>
            <select id="pCategory">
              <option>书籍教材</option>
              <option>生活用品</option>
              <option>数码电器</option>
              <option>衣物鞋包</option>
              <option>运动健身</option>
              <option>美妆护肤</option>
              <option>其他</option>
            </select>
          </div>
          <div class="form-group">
            <label>商品图片</label>
            <!-- ✅ 图片上传控件（已移除 functions 依赖，改用 Cloudinary） -->
            <div class="upload-box">
              <label class="upload-label" id="uploadLabel" for="pImageFile">
                📷 点击选择图片
              </label>
              <!-- capture="environment" 在手机上会直接调起后置摄像头 -->
              <input type="file" id="pImageFile" accept="image/*"
                      style="display:none">
              <!-- 预览区域 -->
              <div id="previewWrap" style="display:none; margin-top:10px;">
                <img id="imagePreview"
                     style="max-width:100%; max-height:200px;
                            border-radius:8px; object-fit:cover;">
              </div>
              <p class="upload-hint">支持 JPG / PNG / WEBP，最大 10MB</p>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>商品描述</label>
          <textarea id="pDesc" placeholder="描述商品成色、使用情况等..."></textarea>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          🚀 发布商品
        </button>
      </form>
    </div>

    <!-- 已发布商品列表 -->
    <div class="product-list-card">
      <h2>📦 已发布商品</h2>
      <div id="productList"></div>
    </div>

  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast"></div>

  <!-- ✅ 相对路径引入 JS，已无需引入 cos-js-sdk -->
  <script src="../js/admin.js"></script>

</body>
</html>
